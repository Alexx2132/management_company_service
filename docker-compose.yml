version: '3.8'

services:
  db:
    image: postgres:15
    container_name: uk_postgres
    restart: always
    environment:
      POSTGRES_USER: uk_admin
      POSTGRES_PASSWORD: uk_password
      POSTGRES_DB: uk_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
